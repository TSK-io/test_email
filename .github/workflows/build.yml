name: Rust Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 获取代码
      uses: actions/checkout@v4

    - name: 缓存依赖
      uses: Swatinem/rust-cache@v2

    - name: 编译 Release 版本
      run: cargo build --release

    - name: 上传 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: test_email_linux_binary
        path: target/release/test_email
