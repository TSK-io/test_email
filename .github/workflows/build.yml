name: Release Debian Package

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Check release version
        run: |
          version="$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)"
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match Cargo.toml version $version" >&2
            exit 1
          fi

      - name: Build binary
        run: cargo build --locked --release --target x86_64-unknown-linux-musl

      - name: Test
        run: cargo test --locked

      - name: Build .deb
        run: ./packaging/build-deb.sh target/x86_64-unknown-linux-musl/release/caln

      - name: Create checksums
        run: cd dist && sha256sum *.deb > SHA256SUMS

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/SHA256SUMS
